<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Premium barber shop offering fades, beard trims, and luxury grooming services. Book your appointment today.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Barber hero section</title>

    <!-- Google Fonts for premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind config for gold color -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: '#f5d76e'
            }
          }
        }
      }
    </script>

    <style>
      /* Apply premium fonts */
      h1, h2 {
        font-family: 'Playfair Display', serif;
      }
      body, p, a, button {
        font-family: 'Poppins', sans-serif;
      }
    </style>

</head>

<body class="bg-black text-white min-h-screen">

<!-- Nav Bar + Hero Section  -->
<section class="relative h-screen bg-cover bg-center" style="background-image: url('Barber bg image.jpg');">
<!-- Overlay -->
  <div class="absolute inset-0 bg-black/60"></div>
  <!-- Navbar -->

<nav class="absolute top-0 left-0 w-full z-20">
  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
    <h1 class="text-2xl font-bold tracking-wide text-white">BARBER<span class="text-yellow-500">PRO</span></h1>

    <ul class="hidden md:flex space-x-8 text-white font-medium">
      <li><a href="Index.html" class="hover:text-yellow-500 transition">Home</a></li>
      <li><a href="Services.html" class="hover:text-yellow-500 transition">Services</a></li>
      <li><a href="Gallery.html" class="hover:text-yellow-500 transition">Gallery</a></li>
      <li><a href="Pricing.html" class="hover:text-yellow-500 transition">Pricing</a></li>
      <li><a href="Contacts.html" class="hover:text-yellow-500 transition">Contact</a></li>
    </ul>
    <button class="md:hidden text-white text-3xl">&#9776;</button>
  </div>
</nav>

  <!-- Hero Content -->
  <div class="relative z-10 flex flex-col justify-center items-center h-full text-center px-6">
    <h2 class="text-5xl md:text-7xl font-extrabold text-white tracking-tight drop-shadow-[0_0_10px_grey]">
      Premium Cuts for the Sophisticated Men
    </h2>

    <p class="mt-4 text-lg md:text-xl text-gray-300 max-w-2xl">
      Experience various styles e.g, sharp fades, clean shaves, and luxury grooming in a studio built for confidence.
    </p>

    <button class="mt-8 px-8 py-4 bg-yellow-500 text-black font-semibold text-lg rounded-lg shadow-lg hover:bg-yellow-300 transition">
      Book Barber Appointment
    </button>
  </div>

</section>
</body>
</html>
